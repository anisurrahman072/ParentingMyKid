plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.parentalcontrol'
version = '1.0.0'

android {
  namespace 'expo.modules.parentalcontrol'

  defaultConfig {
    versionCode 1
    versionName '1.0.0'
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }
}

dependencies {
  // CameraX — compileOnly so the compiler sees the API but we don't ship a
  // duplicate copy in the APK. expo-camera (17.x) already pulls these JARs
  // into the final build via its own 'implementation' declarations.
  // Version must stay in sync with expo-camera's bundled CameraX version.
  def camerax_version = "1.5.0-rc01"
  compileOnly "androidx.camera:camera-core:${camerax_version}"
  compileOnly "androidx.camera:camera-camera2:${camerax_version}"
  compileOnly "androidx.camera:camera-lifecycle:${camerax_version}"
}
